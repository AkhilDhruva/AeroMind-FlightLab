<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#142844"/>
      <stop offset="60%" stop-color="#0a0f17"/>
      <stop offset="100%" stop-color="#06090e"/>
    </radialGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3fa9ff"/>
      <stop offset="100%" stop-color="#1c5d96"/>
    </linearGradient>
    <linearGradient id="prog" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fa9ff"/>
      <stop offset="100%" stop-color="#36e0c8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ground grid -->
  <g stroke="#244563" stroke-opacity="0.35" stroke-width="1">
    <line x1="0" y1="470" x2="1200" y2="470"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="620" x2="1200" y2="620"/>
    <line x1="200" y1="455" x2="60" y2="630"/>
    <line x1="400" y1="455" x2="330" y2="630"/>
    <line x1="600" y1="455" x2="600" y2="630"/>
    <line x1="800" y1="455" x2="870" y2="630"/>
    <line x1="1000" y1="455" x2="1140" y2="630"/>
  </g>

  <!-- landing pad -->
  <ellipse cx="600" cy="540" rx="150" ry="34" fill="none" stroke="#3fa9ff" stroke-opacity="0.55" stroke-width="3"/>
  <ellipse cx="600" cy="540" rx="150" ry="34" fill="#3fa9ff" fill-opacity="0.05"/>

  <!-- top HUD telemetry strip -->
  <g transform="translate(330,40)">
    <rect width="540" height="56" rx="12" fill="#0e131c" fill-opacity="0.85" stroke="#3fa9ff" stroke-opacity="0.18"/>
    <g font-family="monospace" text-anchor="middle">
      <g transform="translate(55,0)"><text x="0" y="24" fill="#5b6b82" font-size="11">ALT</text><text x="0" y="44" fill="#e8f0fb" font-size="18" font-weight="700">5.2</text></g>
      <line x1="100" y1="12" x2="100" y2="44" stroke="#3fa9ff" stroke-opacity="0.18"/>
      <g transform="translate(150,0)"><text x="0" y="24" fill="#5b6b82" font-size="11">HDG</text><text x="0" y="44" fill="#e8f0fb" font-size="18" font-weight="700">090°</text></g>
      <line x1="200" y1="12" x2="200" y2="44" stroke="#3fa9ff" stroke-opacity="0.18"/>
      <g transform="translate(255,0)"><text x="0" y="24" fill="#5b6b82" font-size="11">BATT</text><text x="0" y="44" fill="#54e08a" font-size="18" font-weight="700">86%</text></g>
      <line x1="310" y1="12" x2="310" y2="44" stroke="#3fa9ff" stroke-opacity="0.18"/>
      <g transform="translate(360,0)"><text x="0" y="24" fill="#5b6b82" font-size="11">GPS</text><text x="0" y="44" fill="#54e08a" font-size="18" font-weight="700">12</text></g>
      <line x1="408" y1="12" x2="408" y2="44" stroke="#3fa9ff" stroke-opacity="0.18"/>
      <g transform="translate(475,0)"><text x="0" y="24" fill="#5b6b82" font-size="11">MODE</text><text x="0" y="43" fill="#36e0c8" font-size="14" font-weight="700">STAB</text></g>
    </g>
  </g>

  <!-- drone -->
  <g transform="translate(600,300)" filter="url(#glow)">
    <!-- arms -->
    <g stroke="#14181f" stroke-width="14" stroke-linecap="round">
      <line x1="0" y1="0" x2="-115" y2="-60"/>
      <line x1="0" y1="0" x2="115" y2="-60"/>
      <line x1="0" y1="0" x2="-115" y2="60"/>
      <line x1="0" y1="0" x2="115" y2="60"/>
    </g>
    <!-- props -->
    <g>
      <ellipse cx="-115" cy="-60" rx="60" ry="9" fill="#0c0f14" fill-opacity="0.85"/>
      <ellipse cx="115" cy="-60" rx="60" ry="9" fill="#0c0f14" fill-opacity="0.85"/>
      <ellipse cx="-115" cy="60" rx="60" ry="9" fill="#0c0f14" fill-opacity="0.85"/>
      <ellipse cx="115" cy="60" rx="60" ry="9" fill="#0c0f14" fill-opacity="0.85"/>
    </g>
    <!-- motors -->
    <g fill="#202833">
      <circle cx="-115" cy="-60" r="13"/><circle cx="115" cy="-60" r="13"/>
      <circle cx="-115" cy="60" r="13"/><circle cx="115" cy="60" r="13"/>
    </g>
    <!-- nav lights -->
    <circle cx="-115" cy="-60" r="6" fill="#ffffff"/><circle cx="115" cy="-60" r="6" fill="#ffffff"/>
    <circle cx="-115" cy="60" r="6" fill="#ff3344"/><circle cx="115" cy="60" r="6" fill="#ff3344"/>
    <!-- body -->
    <rect x="-46" y="-34" width="92" height="68" rx="14" fill="#14181f" stroke="#2a3340" stroke-width="2"/>
    <rect x="-30" y="-44" width="60" height="20" rx="6" fill="#1c2533"/>
    <rect x="-26" y="-40" width="52" height="8" rx="4" fill="url(#blue)"/>
    <!-- gimbal -->
    <circle cx="0" cy="40" r="13" fill="#0a0d12"/>
    <circle cx="0" cy="44" r="5" fill="#0a2f4a"/>
  </g>

  <!-- movement arrow -->
  <g stroke="#3fa9ff" stroke-width="5" fill="#3fa9ff" filter="url(#glow)">
    <line x1="730" y1="300" x2="830" y2="300"/>
    <polygon points="830,290 855,300 830,310"/>
  </g>
  <text x="745" y="285" fill="#3fa9ff" font-family="monospace" font-size="13">forward</text>

  <!-- title -->
  <text x="80" y="180" fill="#36e0c8" font-family="monospace" font-size="16" letter-spacing="4">AVIONICS TRAINING SYSTEM</text>
  <text x="78" y="245" fill="#e8f0fb" font-size="62" font-weight="800" letter-spacing="-1">Aero<tspan fill="#3fa9ff">Mind</tspan></text>
  <text x="80" y="290" fill="#bcd4ff" font-size="24" font-weight="600">Drone Avionics Training Simulator</text>
  <text x="80" y="330" fill="#8ea3bf" font-size="17">Learn pitch · roll · yaw · throttle · telemetry · safety —</text>
  <text x="80" y="356" fill="#8ea3bf" font-size="17">before you ever touch real hardware.</text>

  <!-- input->physics->explanation chip -->
  <g transform="translate(80,400)">
    <rect width="420" height="56" rx="12" fill="#0e131c" fill-opacity="0.85" stroke="#36e0c8" stroke-opacity="0.4"/>
    <rect x="0" y="0" width="3" height="56" rx="2" fill="#36e0c8"/>
    <text x="18" y="26" fill="#e8f0fb" font-size="14" font-weight="700">Input → Physics → Explanation</text>
    <text x="18" y="44" fill="#8ea3bf" font-size="12.5">Every control input becomes a visible lesson.</text>
  </g>

  <!-- mission progress -->
  <g transform="translate(80,478)">
    <rect width="420" height="8" rx="4" fill="#ffffff" fill-opacity="0.08"/>
    <rect width="290" height="8" rx="4" fill="url(#prog)"/>
    <text x="0" y="-8" fill="#36e0c8" font-family="monospace" font-size="11" letter-spacing="1">MISSION · PITCH CONTROL</text>
    <text x="420" y="-8" fill="#54e08a" font-family="monospace" font-size="11" text-anchor="end">SCORE 92</text>
  </g>

  <!-- control keycaps -->
  <g transform="translate(80,520)" font-family="monospace" font-size="13" fill="#8ea3bf">
    <g>
      <rect width="42" height="30" rx="6" fill="#141c2a" stroke="#3fa9ff" stroke-opacity="0.3"/><text x="21" y="20" text-anchor="middle" fill="#3fa9ff">W S</text>
      <rect x="52" width="42" height="30" rx="6" fill="#141c2a" stroke="#3fa9ff" stroke-opacity="0.3"/><text x="73" y="20" text-anchor="middle" fill="#3fa9ff">A D</text>
      <rect x="104" width="42" height="30" rx="6" fill="#141c2a" stroke="#3fa9ff" stroke-opacity="0.3"/><text x="125" y="20" text-anchor="middle" fill="#3fa9ff">Q E</text>
      <rect x="156" width="90" height="30" rx="6" fill="#141c2a" stroke="#3fa9ff" stroke-opacity="0.3"/><text x="201" y="20" text-anchor="middle" fill="#3fa9ff">SPACE / SHIFT</text>
    </g>
    <text x="0" y="52" fill="#5b6b82" font-size="11">pitch · roll · yaw · throttle</text>
  </g>

  <text x="1120" y="600" text-anchor="end" fill="#5b6b82" font-family="monospace" font-size="11">Educational civilian flight-training simulation · not a real drone control system</text>
</svg>
